<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Rooms - ISHAANX</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .my-rooms-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .my-rooms-header h1 { margin: 0; }

    .room-card-owner {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }
    .room-card-owner:hover { transform: translateY(-3px); }

    .room-card-owner img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      cursor: pointer;
    }

    .room-card-owner .card-body { padding: 1rem; }
    .room-card-owner h3 {
      margin-bottom: 0.3rem;
      cursor: pointer;
      color: #2c3e50;
    }
    .room-card-owner h3:hover { color: #f39c12; }
    .room-card-owner .price { color: #f39c12; font-weight: bold; font-size: 1.05rem; }
    .room-card-owner .location { color: #888; font-size: 0.85rem; margin-top: 0.2rem; }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.9rem;
      flex-wrap: wrap;
    }
    .card-actions button {
      flex: 1;
      min-width: 70px;
      padding: 0.45rem 0.6rem;
      font-size: 0.82rem;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .card-actions button:hover { opacity: 0.85; }

    .btn-edit-card   { background: #3498db; color: #fff; }
    .btn-delete-card { background: #e74c3c; color: #fff; }
    .btn-available   { background: #27ae60; color: #fff; }
    .btn-occupied    { background: #e67e22; color: #fff; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-available { background: #d4edda; color: #155724; }
    .status-occupied  { background: #f8d7da; color: #721c24; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }
    .empty-state a {
      color: #f39c12;
      text-decoration: underline;
    }

    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 0.8rem 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      min-width: 120px;
      text-align: center;
    }
    .stat-card .stat-num { font-size: 1.6rem; font-weight: 700; }
    .stat-card .stat-label { font-size: 0.8rem; color: #888; margin-top: 0.1rem; }
    .stat-available .stat-num { color: #27ae60; }
    .stat-occupied  .stat-num { color: #e74c3c; }
    .stat-total     .stat-num { color: #2c3e50; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">IX</div>
    <div class="logo-text">ISHAANX</div>
  </a>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div id="nav-links" class="nav-links">
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<div class="container">
  <div class="my-rooms-header">
    <h1>My Rooms</h1>
    <a href="post-room.html" class="btn-primary" style="text-decoration:none;padding:0.6rem 1.2rem;background:#f39c12;color:#fff;border-radius:6px;font-weight:600;">+ Post New Room</a>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none"></div>

  <div class="rooms-grid" id="rooms-grid">
    <p>Loading your rooms...</p>
  </div>
</div>

<script>
  const API = 'https://accommodation-mvp.onrender.com/api';

  function toggleMenu() {
    document.getElementById('nav-links').classList.toggle('active');
  }

  function updateNav() {
    const name = localStorage.getItem('userName');
    const nav  = document.getElementById('nav-links');
    if (name) {
      nav.innerHTML = `
        <span class="welcome">Welcome, ${name}</span>
        <a href="index.html">Browse Rooms</a>
        <a href="my-rooms.html" style="color:#f39c12;font-weight:600">My Rooms</a>
        <a href="/pages/favorites.html">Favorites</a>
        <a href="post-room.html">Post Room</a>
        <a href="inbox.html">Inbox</a>
        <a href="#" onclick="logout()">Logout</a>`;
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('userName');
    location.href = 'login.html';
  }

  async function loadMyRooms() {
    const token = localStorage.getItem('token');
    if (!token) {
      document.getElementById('rooms-grid').innerHTML =
        '<p class="empty-state">You must be <a href="login.html">logged in</a> to view your rooms.</p>';
      return;
    }

    try {
      const res = await fetch(`${API}/rooms/my-rooms`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Failed to fetch');
      const rooms = await res.json();
      renderStats(rooms);
      renderRooms(rooms);
    } catch (err) {
      document.getElementById('rooms-grid').innerHTML = '<p>Error loading rooms. Please try again.</p>';
    }
  }

  function renderStats(rooms) {
    const available = rooms.filter(r => r.status === 'available').length;
    const occupied  = rooms.filter(r => r.status === 'occupied').length;
    const bar = document.getElementById('stats-bar');
    bar.style.display = 'flex';
    bar.innerHTML = `
      <div class="stat-card stat-total">
        <div class="stat-num">${rooms.length}</div>
        <div class="stat-label">Total Listings</div>
      </div>
      <div class="stat-card stat-available">
        <div class="stat-num">${available}</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat-card stat-occupied">
        <div class="stat-num">${occupied}</div>
        <div class="stat-label">Occupied</div>
      </div>`;
  }

  function renderRooms(rooms) {
    const grid = document.getElementById('rooms-grid');
    if (!rooms.length) {
      grid.innerHTML = `<p class="empty-state">You haven't posted any rooms yet. <a href="post-room.html">Post your first room →</a></p>`;
      return;
    }

    grid.innerHTML = rooms.map(r => {
      const img = r.images && r.images.length > 0
        ? `https://accommodation-mvp.onrender.com/uploads/${r.images[0]}`
        : 'https://placehold.co/400x200?text=No+Image';
      const isOccupied = r.status === 'occupied';
      return `
        <div class="room-card-owner" id="card-${r._id}">
          <img src="${img}" alt="room" onclick="location.href='room.html?id=${r._id}'" />
          <div class="card-body">
            <h3 onclick="location.href='room.html?id=${r._id}'">${r.title}</h3>
            <div class="price">€${r.price}/month</div>
            <div class="location">📍 ${r.location}</div>
            <div class="status-row">
              <span class="status-badge ${isOccupied ? 'status-occupied' : 'status-available'}" id="badge-${r._id}">
                ${isOccupied ? 'Occupied' : 'Available'}
              </span>
            </div>
            <div class="card-actions">
              <button class="btn-edit-card" onclick="editRoom('${r._id}')">✏️ Edit</button>
              <button class="${isOccupied ? 'btn-available' : 'btn-occupied'}" id="toggle-btn-${r._id}" onclick="toggleStatus('${r._id}', this)">
                ${isOccupied ? '✅ Mark Available' : '🔴 Mark Occupied'}
              </button>
              <button class="btn-delete-card" onclick="deleteRoom('${r._id}')">🗑️ Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function editRoom(roomId) {
    location.href = `post-room.html?id=${roomId}`;
  }

  async function toggleStatus(roomId, btn) {
    const token = localStorage.getItem('token');
    try {
      const res = await fetch(`${API}/rooms/${roomId}/status`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) { alert(data.message || 'Failed to update status'); return; }

      const badge    = document.getElementById(`badge-${roomId}`);
      const isNowOccupied = data.status === 'occupied';

      badge.textContent = isNowOccupied ? 'Occupied' : 'Available';
      badge.className   = `status-badge ${isNowOccupied ? 'status-occupied' : 'status-available'}`;

      btn.textContent = isNowOccupied ? '✅ Mark Available' : '🔴 Mark Occupied';
      btn.className   = isNowOccupied ? 'btn-available' : 'btn-occupied';

      renderStats(collectCurrentRoomData());
    } catch (err) {
      console.error('Error toggling status:', err);
    }
  }

  function collectCurrentRoomData() {
    const badges = document.querySelectorAll('[id^="badge-"]');
    let available = 0, occupied = 0;
    badges.forEach(b => {
      if (b.textContent.trim() === 'Occupied') occupied++;
      else available++;
    });
    const total = available + occupied;
    return Array.from({ length: total }, (_, i) => ({
      status: i < available ? 'available' : 'occupied'
    }));
  }

  async function deleteRoom(roomId) {
    if (!confirm('Delete this room? This cannot be undone.')) return;
    const token = localStorage.getItem('token');
    try {
      const res  = await fetch(`${API}/rooms/${roomId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (res.ok) {
        const card = document.getElementById(`card-${roomId}`);
        if (card) card.remove();
        const remaining = document.querySelectorAll('[id^="card-"]').length;
        if (!remaining) {
          document.getElementById('rooms-grid').innerHTML =
            '<p class="empty-state">You haven\'t posted any rooms yet. <a href="post-room.html">Post your first room →</a></p>';
        }
        renderStats(collectCurrentRoomData());
      } else {
        alert(data.message || 'Failed to delete room');
      }
    } catch (err) {
      console.error('Error deleting room:', err);
    }
  }

  updateNav();
  loadMyRooms();
</script>
</body>
</html>
