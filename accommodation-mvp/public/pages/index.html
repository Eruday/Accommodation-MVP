<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Germany Rooms - Find Accommodation</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav class="navbar">
 <a href="../pages/index.html" class="logo">
  <div class="logo-icon">IX</div>
  <div class="logo-text">ISHAANX</div>
</a>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div id="nav-links" class="nav-links">
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<div class="container">
  <h1>Find Your Next Room in Germany</h1>

  <div class="search-bar">
  <input type="text" id="search-input" placeholder="Search city (Berlin, Munich)" />
  <button onclick="searchRooms()">🔍</button>
</div>

  <!-- Advanced Filters -->
   <button class="filter-toggle" onclick="toggleFilters()">
  🔍 Filters
</button>
  <div class="filters hidden" id="filters">
    <h3>Advanced Filters</h3>
    <div class="filter-row">
      <div class="filter-item">
        <label for="minPrice">Min Price (€)</label>
        <input type="number" id="minPrice" placeholder="0" />
      </div>
      <div class="filter-item">
        <label for="maxPrice">Max Price (€)</label>
        <input type="number" id="maxPrice" placeholder="1000" />
      </div>
      <div class="filter-item">
        <label for="roomType">Room Type</label>
        <select id="roomType">
          <option value="">Any</option>
          <option value="single">Single</option>
          <option value="shared">Shared</option>
          <option value="studio">Studio</option>
          <option value="apartment">Apartment</option>
        </select>
      </div>
      <div class="filter-item">
        <label for="furnishing">Furnishing</label>
        <select id="furnishing">
          <option value="">Any</option>
          <option value="furnished">Furnished</option>
          <option value="semi">Semi Furnished</option>
          <option value="unfurnished">Unfurnished</option>
        </select>
      </div>
      <div class="filter-item">
        <label for="availableFrom">Available From</label>
        <input type="date" id="availableFrom" />
      </div>
    </div>
    <div class="filter-actions">
 <button class="btn-primary" onclick="applyFilters()">Apply Filters</button>
    <button class="btn-secondary" onclick="clearFilters()">Clear</button>
    </div>
   
  </div>
<h2 class="section-title">Available Rooms</h2>
  <div class="rooms-grid" id="rooms-grid">
    <p>Loading rooms...</p>
  </div>
</div>

<script>
  const API = 'https://accommodation-mvp.onrender.com/api';

  function updateNav() {
    const name = localStorage.getItem('userName');
    const nav = document.getElementById('nav-links');
    if (name) {
      nav.innerHTML = `
  <span class="welcome">Welcome, ${name}</span>
  <a href="my-rooms.html">My Rooms</a>
  <a href="favorites.html">Favorites</a>
  <a href="post-room.html">Post Room</a>
  <a href="inbox.html">Inbox</a>
  <a href="#" onclick="logout()">Logout</a>`;
    }
  }
function toggleFilters() {
  const el = document.getElementById('filters');
  const btn = document.querySelector('.filter-toggle');

  el.classList.toggle('hidden');

  btn.innerText = el.classList.contains('hidden')
    ? "🔍 Filters"
    : "Hide Filters ▲";
}
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('userName');
    location.reload();
  }

  async function toggleFavorite(roomId, btn) {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Please login to save favorites');
      return;
    }
    const heart = btn.querySelector('.heart-icon');
    const isFavorited = heart.classList.contains('favorited');

    try {
      if (isFavorited) {
        const res = await fetch(`${API}/favorites/${roomId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          heart.classList.remove('favorited');
        }
      } else {
        const res = await fetch(`${API}/favorites`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ roomId })
        });
        if (res.ok) {
          heart.classList.add('favorited');
        }
      }
    } catch (err) {
      console.error('Error toggling favorite:', err);
    }
  }

  async function checkFavoriteStatus(roomId) {
    const token = localStorage.getItem('token');
    if (!token) return;
    try {
      const res = await fetch(`${API}/favorites/${roomId}/isFavorite`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const btn = document.querySelector(`button[onclick*="toggleFavorite('${roomId}'"]`);
      if (btn) {
        const heart = btn.querySelector('.heart-icon');
        if (data.isFavorite) {
          heart.classList.add('favorited');
        } else {
          heart.classList.remove('favorited');
        }
      }
    } catch (err) {
      console.error('Error checking favorite status:', err);
    }
  }

  async function loadRooms(filters = {}) {
    const params = new URLSearchParams();
    if (filters.location) params.append('location', filters.location);
    if (filters.minPrice) params.append('minPrice', filters.minPrice);
    if (filters.maxPrice) params.append('maxPrice', filters.maxPrice);
    if (filters.roomType) params.append('roomType', filters.roomType);
    if (filters.furnishing) params.append('furnishing', filters.furnishing);
    if (filters.availableFrom) params.append('availableFrom', filters.availableFrom);

    const url = `${API}/rooms${params.toString() ? '?' + params.toString() : ''}`;
    const res = await fetch(url);
    const rooms = await res.json();
    renderRooms(rooms);
  }

 function searchRooms() {
  const val = document.getElementById('search-input').value.trim();
  if (!val) {
    loadRooms(); // show all if empty
  } else {
    loadRooms({ location: val });
  }
}

  function applyFilters() {
    const filters = {
      location: document.getElementById('search-input').value.trim(),
      minPrice: document.getElementById('minPrice').value,
      maxPrice: document.getElementById('maxPrice').value,
      roomType: document.getElementById('roomType').value,
      furnishing: document.getElementById('furnishing').value,
      availableFrom: document.getElementById('availableFrom').value
    };
    loadRooms(filters);
  }

  function clearFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
    document.getElementById('roomType').value = '';
    document.getElementById('furnishing').value = '';
    document.getElementById('availableFrom').value = '';
    loadRooms();
  }
  function toggleMenu() {
  document.getElementById('nav-links').classList.toggle('active');
}

  function renderRooms(rooms) {
    const grid = document.getElementById('rooms-grid');
    if (!rooms.length) { grid.innerHTML = '<p>No rooms found.</p>'; return; }
    grid.innerHTML = rooms.map(r => `
      <div class="room-card">
        <img src="${r.images && r.images.length > 0 ? 'https://accommodation-mvp.onrender.com/uploads/' + r.images[0] : 'https://placehold.co/400x200?text=No+Image'}" alt="room" onclick="location.href='room.html?id=${r._id}'"/>
        <button class="favorite-btn" onclick="toggleFavorite('${r._id}', this)">
          <span class="heart-icon">♥</span>
        </button>
        <div class="info" onclick="location.href='room.html?id=${r._id}'">
          <h3>${r.title}</h3>
          <div class="price">€${r.price}/month</div>
          <div class="location">${r.location}</div>
          <span class="status-badge status-available" style="margin-top:0.4rem;display:inline-block">Available</span>
        </div>
      </div>`).join('');
    // After rendering, check favorite status for each room
    rooms.forEach(r => checkFavoriteStatus(r._id));
  }

  updateNav();
  loadRooms();
</script>
</body>
</html>
